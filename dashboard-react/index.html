<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support Operations Analytics - React Dashboard</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- ApexCharts CDN -->
  <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
  <!-- React & ReactDOM CDNs -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <!-- HTM CDN (Binds template literals to React.createElement) -->
  <script src="https://unpkg.com/htm@3.1.1/dist/htm.js"></script>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Georgia&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #F6F3EC;
      color: #2A2A28;
    }
    h1, h2, h3, .serif-font {
      font-family: 'Georgia', serif;
    }
    .mono-font {
      font-family: 'JetBrains Mono', monospace;
    }
    .accent-clay { color: #B4432F; }
    .bg-clay { background-color: #B4432F; }
    .border-clay { border-color: #B4432F; }
    .accent-amber { color: #C1832B; }
    .bg-amber { background-color: #C1832B; }
    .border-amber { border-color: #C1832B; }
    .accent-moss { color: #2F6E5C; }
    .bg-moss { background-color: #2F6E5C; }
    .border-moss { border-color: #2F6E5C; }
    .accent-ink { color: #16233D; }
    .bg-ink { background-color: #16233D; }
    .border-ink { border-color: #16233D; }
    .border-line { border-color: #DCD5C6; }
    .bg-paper { background-color: #F6F3EC; }
  </style>
</head>
<body class="min-h-screen py-8 px-4 sm:px-6 lg:px-8">
  <div id="root"></div>

  <!-- Load Data Fallback -->
  <script src="data.js"></script>
  
  <!-- Setup HTM Global helper -->
  <script>
    window.html = htm.bind(React.createElement);
  </script>

  <!-- Load React Components (global script tags to avoid CORS issues) -->
  <script src="components/KpiStrip.js?v=3"></script>
  <script src="components/CostImpact.js?v=3"></script>
  <script src="components/ProcessWaste.js?v=3"></script>
  <script src="components/RepeatChurn.js?v=3"></script>
  <script src="components/StaffingSimulator.js?v=3"></script>
  <script src="components/Recommendations.js?v=3"></script>
  <script src="components/VolumeForecast.js?v=3"></script>
  
  <!-- App Entry Point -->
  <script src="App.js?v=3"></script>
  <script src="main.js?v=3"></script>
</body>
</html>
